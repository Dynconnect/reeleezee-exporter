services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn web.app:create_app --host 0.0.0.0 --port 8000 --factory
    ports:
      - "8000:8000"
    volumes:
      - export-data:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_PATH=/app/data/jobs.db
      - DATA_DIR=/app/data/exports
      - SECRET_KEY=${SECRET_KEY:-please-change-this-in-production}
    depends_on:
      - redis

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: rq worker --url redis://redis:6379/0 exports downloads
    volumes:
      - export-data:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_PATH=/app/data/jobs.db
      - DATA_DIR=/app/data/exports
      - SECRET_KEY=${SECRET_KEY:-please-change-this-in-production}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  export-data:
  redis-data:
